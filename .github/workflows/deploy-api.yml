name: Deploy KidPulse API

on:
  push:
    branches:
      - main
      - feature/phase6-backend-deployement
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  # ====================================
  # FEATURE BRANCH → Railway Production (Test)
  # ====================================
  deploy-feature:
    if: github.ref == 'refs/heads/feature/phase6-backend-deployement'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      RAILWAY_PROJECT_ID: 23e7df62-a7a1-4eab-8cbd-e1101cd0cfe6
      RAILWAY_SERVICE_ID: 4cbea124-e715-4804-a194-c7d665bd632b
      RAILWAY_ENVIRONMENT: production
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"

      - name: Build TypeScript
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Railway environment variables
        run: |
          railway variables set PORT="${{ secrets.PORT }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set DATABASE_URL="${{ secrets.DATABASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set LOG_LEVEL="${{ secrets.LOG_LEVEL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set WEB_BASE_URL="${{ secrets.WEB_BASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set API_PUBLIC_URL="${{ secrets.API_PUBLIC_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set EMAIL_FROM="${{ secrets.EMAIL_FROM }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_MERCHANT_ID="${{ secrets.PAYHERE_MERCHANT_ID }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_MERCHANT_SECRET="${{ secrets.PAYHERE_MERCHANT_SECRET }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_SANDBOX="${{ secrets.PAYHERE_SANDBOX }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_HOST="${{ secrets.SMTP_HOST }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_PORT="${{ secrets.SMTP_PORT }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_SECURE="${{ secrets.SMTP_SECURE }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_USER="${{ secrets.SMTP_USER }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_PASS="${{ secrets.SMTP_PASS }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: |
          railway up \
            --project $RAILWAY_PROJECT_ID \
            --service $RAILWAY_SERVICE_ID \
            --environment $RAILWAY_ENVIRONMENT \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ====================================
  # MAIN → Railway Production
  # ====================================
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      RAILWAY_PROJECT_ID: 23e7df62-a7a1-4eab-8cbd-e1101cd0cfe6
      RAILWAY_SERVICE_ID: 4cbea124-e715-4804-a194-c7d665bd632b
      RAILWAY_ENVIRONMENT: production
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@placeholder:5432/placeholder"

      - name: Build TypeScript
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Railway environment variables
        run: |
          railway variables set PORT="${{ secrets.PORT }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set DATABASE_URL="${{ secrets.DATABASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set LOG_LEVEL="${{ secrets.LOG_LEVEL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set WEB_BASE_URL="${{ secrets.WEB_BASE_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set API_PUBLIC_URL="${{ secrets.API_PUBLIC_URL }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set EMAIL_FROM="${{ secrets.EMAIL_FROM }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_MERCHANT_ID="${{ secrets.PAYHERE_MERCHANT_ID }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_MERCHANT_SECRET="${{ secrets.PAYHERE_MERCHANT_SECRET }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set PAYHERE_SANDBOX="${{ secrets.PAYHERE_SANDBOX }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_HOST="${{ secrets.SMTP_HOST }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_PORT="${{ secrets.SMTP_PORT }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_SECURE="${{ secrets.SMTP_SECURE }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_USER="${{ secrets.SMTP_USER }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
          railway variables set SMTP_PASS="${{ secrets.SMTP_PASS }}" --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID --environment $RAILWAY_ENVIRONMENT
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: |
          railway up \
            --project $RAILWAY_PROJECT_ID \
            --service $RAILWAY_SERVICE_ID \
            --environment $RAILWAY_ENVIRONMENT \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}